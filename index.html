<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 นิทานหรรษา — นิทานเล่าเสียงสำหรับเด็ก</title>
<meta name="description" content="เว็บเล่านิทานสำหรับเด็ก มีเสียง AI เล่าเรื่องภาษาไทย ภาพประกอบสดใส แตะแต่ละฉากเพื่อฟังได้เอง">
<meta name="theme-color" content="#7C5CE0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="นิทานหรรษา">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #FFF7E8;
    --purple: #7C5CE0;
    --pink: #FF7BAC;
    --yellow: #FFC93C;
    --green: #4ECDC4;
    --orange: #FF9F5A;
    --text: #4A3B5C;
  }

  body {
    font-family: -apple-system, "Sukhumvit Set", "Thonburi", "Noto Sans Thai", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- floating background decorations ---------- */
  .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bubble {
    position: absolute; border-radius: 50%; opacity: .12;
    animation: floaty 12s ease-in-out infinite alternate;
  }
  @keyframes floaty {
    from { transform: translateY(0) rotate(0deg); }
    to   { transform: translateY(-46px) rotate(18deg); }
  }

  .page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

  /* ---------- header ---------- */
  header { text-align: center; padding: 18px 0 8px; }
  header h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    background: linear-gradient(90deg, var(--purple), var(--pink), var(--orange));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: 1px;
  }
  header p { margin-top: 6px; font-size: 1.1rem; color: #8a7ba0; }

  /* ---------- story picker ---------- */
  .story-grid {
    display: grid; gap: 22px; margin-top: 26px;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  }
  .story-card {
    background: #fff; border-radius: 28px; overflow: hidden; cursor: pointer;
    border: 4px solid transparent;
    box-shadow: 0 8px 24px rgba(124, 92, 224, .14);
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    text-align: center;
  }
  .story-card:hover, .story-card:focus-visible {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 16px 34px rgba(124, 92, 224, .25);
    border-color: var(--yellow);
    outline: none;
  }
  .story-card:active { transform: scale(.97); }
  .story-card .cover { width: 100%; display: block; }
  .story-card .info { padding: 16px 14px 20px; }
  .story-card h2 { font-size: 1.4rem; }
  .story-card p { color: #9187a5; margin-top: 4px; font-size: .95rem; }
  .story-card .play-hint {
    display: inline-block; margin-top: 12px; padding: 8px 22px;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    color: #fff; border-radius: 999px; font-size: 1rem; font-weight: 600;
  }

  /* ---------- story reader ---------- */
  .reader { display: none; }
  .reader.active { display: block; }
  .picker.hidden { display: none; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; border: 3px solid var(--purple); color: var(--purple);
    font-family: inherit; font-size: 1.05rem; font-weight: 700;
    padding: 10px 20px; border-radius: 999px; cursor: pointer;
    transition: transform .15s ease, background .15s ease;
  }
  .back-btn:hover { background: var(--purple); color: #fff; transform: scale(1.05); }

  .reader h2.story-title { text-align: center; font-size: clamp(1.5rem, 4.5vw, 2.2rem); margin: 14px 0 4px; }
  .scene-counter { text-align: center; color: #9187a5; font-size: 1rem; margin-bottom: 14px; }

  .scene-stage {
    background: #fff; border-radius: 32px; padding: 18px;
    box-shadow: 0 10px 30px rgba(124, 92, 224, .16);
    max-width: 720px; margin: 0 auto;
  }
  .scene-art {
    border-radius: 24px; overflow: hidden; cursor: pointer; position: relative;
    transition: transform .2s ease;
  }
  .scene-art:active { transform: scale(.98); }
  .scene-art svg { width: 100%; height: auto; display: block; }
  .scene-art.speaking { animation: gentle-bounce 1s ease-in-out infinite; }
  @keyframes gentle-bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.015); }
  }
  .tap-hint {
    position: absolute; bottom: 12px; right: 14px;
    background: rgba(255,255,255,.92); border-radius: 999px;
    padding: 8px 16px; font-size: .95rem; font-weight: 700; color: var(--purple);
    box-shadow: 0 3px 10px rgba(0,0,0,.12);
    animation: pulse-hint 1.6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse-hint { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .scene-art.speaking .tap-hint { animation: none; }

  .scene-text {
    font-size: clamp(1.15rem, 3.4vw, 1.45rem); line-height: 1.95;
    padding: 18px 10px 6px; text-align: center;
  }
  .scene-text .w {
    border-radius: 8px; padding: 1px 3px; transition: background .12s ease, color .12s ease;
  }
  .scene-text .w.on {
    background: var(--yellow); color: var(--text); font-weight: 700;
    box-shadow: 0 0 0 3px rgba(255,201,60,.35);
  }

  /* ---------- controls ---------- */
  .controls {
    display: flex; justify-content: center; align-items: center; gap: 14px;
    margin-top: 20px; flex-wrap: wrap;
  }
  .ctrl-btn {
    font-family: inherit; font-weight: 800; border: none; cursor: pointer;
    border-radius: 999px; transition: transform .15s ease, filter .15s ease;
    color: #fff; display: inline-flex; align-items: center; gap: 8px;
  }
  .ctrl-btn:hover:not(:disabled) { transform: scale(1.07); filter: brightness(1.06); }
  .ctrl-btn:active:not(:disabled) { transform: scale(.94); }
  .ctrl-btn:disabled { opacity: .35; cursor: default; }

  .nav-btn { background: var(--green); font-size: 1.15rem; padding: 14px 22px; box-shadow: 0 6px 0 #35b0a7; }
  .nav-btn:active:not(:disabled) { box-shadow: 0 2px 0 #35b0a7; }
  .play-btn {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    font-size: 1.35rem; padding: 18px 34px; box-shadow: 0 7px 0 #b0559a;
  }
  .play-btn:active { box-shadow: 0 2px 0 #b0559a; }

  .dots { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
  .dot {
    width: 16px; height: 16px; border-radius: 50%; background: #E4DAF4;
    border: none; cursor: pointer; transition: all .2s ease; padding: 0;
  }
  .dot.done { background: var(--yellow); }
  .dot.current { background: var(--purple); transform: scale(1.35); }

  .auto-row { display: flex; justify-content: center; margin-top: 18px; }
  .auto-toggle {
    display: inline-flex; align-items: center; gap: 10px; cursor: pointer;
    background: #fff; border-radius: 999px; padding: 10px 20px;
    box-shadow: 0 4px 14px rgba(124,92,224,.12); font-weight: 700; font-size: 1rem;
    user-select: none;
  }
  .auto-toggle input { width: 22px; height: 22px; accent-color: var(--purple); cursor: pointer; }

  /* ---------- speed control ---------- */
  .speed-row {
    display: flex; justify-content: center; align-items: center; gap: 12px;
    margin-top: 16px; flex-wrap: wrap;
  }
  .speed-label { font-weight: 700; color: #8a7ba0; font-size: 1rem; }
  .speed-seg {
    display: inline-flex; background: #fff; border-radius: 999px; padding: 5px;
    box-shadow: 0 4px 14px rgba(124,92,224,.12); gap: 4px;
  }
  .speed-seg button {
    font-family: inherit; font-weight: 800; font-size: 1rem; cursor: pointer;
    border: none; background: transparent; color: #9187a5;
    padding: 8px 16px; border-radius: 999px; transition: all .18s ease;
  }
  .speed-seg button:hover { background: #F3EEFB; }
  .speed-seg button.active {
    background: linear-gradient(135deg, var(--green), #38b6ab); color: #fff;
    box-shadow: 0 3px 8px rgba(78,205,196,.4);
  }

  /* ---------- celebration ---------- */
  .confetti-piece {
    position: fixed; top: -20px; z-index: 50; pointer-events: none;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }
  .the-end {
    display: none; text-align: center; margin-top: 18px;
    font-size: 1.5rem; font-weight: 800; color: var(--orange);
    animation: pop-in .5s ease;
  }
  .the-end.show { display: block; }
  @keyframes pop-in { from { transform: scale(.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .no-voice-note {
    display: none; text-align: center; background: #FFF0F0; color: #C0392B;
    border-radius: 16px; padding: 12px 16px; margin: 14px auto 0; max-width: 640px; font-size: .95rem;
  }
</style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>

<div class="page">
  <header>
    <h1>🌈 นิทานหรรษา 🎈</h1>
    <p>แตะรูปภาพ แล้วฟังพี่ AI เล่านิทานให้ฟังนะจ๊ะ 🎧</p>
  </header>

  <!-- story picker -->
  <section class="picker" id="picker">
    <div class="story-grid" id="storyGrid"></div>
  </section>

  <!-- story reader -->
  <section class="reader" id="reader">
    <button class="back-btn" id="backBtn">⬅️ กลับไปเลือกนิทาน</button>
    <h2 class="story-title" id="storyTitle"></h2>
    <div class="scene-counter" id="sceneCounter"></div>

    <div class="scene-stage">
      <div class="scene-art" id="sceneArt" role="button" tabindex="0" aria-label="แตะเพื่อฟังนิทาน">
        <div id="sceneSvg"></div>
        <div class="tap-hint" id="tapHint">👆 แตะเพื่อฟัง</div>
      </div>
      <p class="scene-text" id="sceneText"></p>
    </div>

    <div class="controls">
      <button class="ctrl-btn nav-btn" id="prevBtn">⬅️ ก่อนหน้า</button>
      <button class="ctrl-btn play-btn" id="playBtn">▶️ ฟังนิทาน</button>
      <button class="ctrl-btn nav-btn" id="nextBtn">ถัดไป ➡️</button>
    </div>

    <div class="dots" id="dots"></div>

    <div class="speed-row">
      <span class="speed-label">⚡ ความเร็ว</span>
      <div class="speed-seg" id="speedSeg">
        <button type="button" data-rate="0.8">🐢 ช้า</button>
        <button type="button" data-rate="1" class="active">🙂 ปกติ</button>
        <button type="button" data-rate="1.25">🐇 เร็ว</button>
      </div>
    </div>

    <div class="auto-row">
      <label class="auto-toggle">
        <input type="checkbox" id="autoPlay">
        🪄 เล่าต่อเองทุกฉาก
      </label>
    </div>

    <div class="the-end" id="theEnd">🎉 จบแล้วจ้า เก่งมากที่ฟังจนจบ! 🎉</div>
    <div class="no-voice-note" id="noVoiceNote">
      เครื่องนี้ยังไม่มีเสียงภาษาไทยจ้า — ลองเปิดใน Safari หรือ Chrome บนมือถือ/แท็บเล็ตดูนะ
    </div>
  </section>
</div>

<script>
/* ============================================================
   SVG scene art helpers — cute flat cartoon style
   ============================================================ */
let skyId = 0;
const SKY = (top, bottom) => {
  const id = `sky-${skyId++}`;
  return `<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="${top}"/><stop offset="1" stop-color="${bottom}"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#${id})"/>`;
};

const SUN = (x, y) => `<circle cx="${x}" cy="${y}" r="46" fill="#FFD93D"/>
  <circle cx="${x}" cy="${y}" r="58" fill="#FFD93D" opacity=".3"/>`;

const MOON = (x, y) => `<circle cx="${x}" cy="${y}" r="40" fill="#FFF6D5"/><circle cx="${x+16}" cy="${y-8}" r="34" fill="#39457B"/>`;

const CLOUD = (x, y, s = 1) => `<g transform="translate(${x},${y}) scale(${s})" fill="#fff" opacity=".9">
  <ellipse cx="0" cy="0" rx="46" ry="24"/><ellipse cx="-32" cy="8" rx="30" ry="17"/><ellipse cx="34" cy="8" rx="30" ry="17"/></g>`;

const GROUND = (color) => `<ellipse cx="400" cy="560" rx="560" ry="150" fill="${color}"/>`;

const TREE = (x, y, s = 1, leaf = '#5FBF6E') => `<g transform="translate(${x},${y}) scale(${s})">
  <rect x="-11" y="0" width="22" height="70" rx="10" fill="#9C6B3F"/>
  <circle cx="0" cy="-32" r="52" fill="${leaf}"/><circle cx="-38" cy="-6" r="36" fill="${leaf}"/><circle cx="38" cy="-6" r="36" fill="${leaf}"/></g>`;

const FLOWER = (x, y, c = '#FF7BAC') => `<g transform="translate(${x},${y})">
  <rect x="-2" y="0" width="4" height="22" fill="#5FBF6E"/>
  <circle cx="0" cy="-4" r="7" fill="${c}"/><circle cx="-8" cy="2" r="7" fill="${c}"/><circle cx="8" cy="2" r="7" fill="${c}"/>
  <circle cx="0" cy="0" r="5" fill="#FFD93D"/></g>`;

const RABBIT = (x, y, s = 1, extra = '') => `<g transform="translate(${x},${y}) scale(${s})">
  <ellipse cx="0" cy="86" rx="46" ry="12" fill="rgba(0,0,0,.08)"/>
  <ellipse cx="-14" cy="-58" rx="12" ry="34" fill="#fff" stroke="#E8D5E0" stroke-width="3"/>
  <ellipse cx="14" cy="-58" rx="12" ry="34" fill="#fff" stroke="#E8D5E0" stroke-width="3"/>
  <ellipse cx="-14" cy="-58" rx="6" ry="24" fill="#FFC9DD"/><ellipse cx="14" cy="-58" rx="6" ry="24" fill="#FFC9DD"/>
  <circle cx="0" cy="0" r="34" fill="#fff" stroke="#E8D5E0" stroke-width="3"/>
  <ellipse cx="0" cy="52" rx="30" ry="34" fill="#fff" stroke="#E8D5E0" stroke-width="3"/>
  <circle cx="-12" cy="-6" r="4.5" fill="#4A3B5C"/><circle cx="12" cy="-6" r="4.5" fill="#4A3B5C"/>
  <ellipse cx="0" cy="6" rx="5" ry="4" fill="#FF7BAC"/>
  <path d="M -8 14 Q 0 20 8 14" stroke="#4A3B5C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="-22" cy="4" r="6" fill="#FFC9DD" opacity=".7"/><circle cx="22" cy="4" r="6" fill="#FFC9DD" opacity=".7"/>
  ${extra}</g>`;

const RABBIT_SLEEP = (x, y, s = 1) => `<g transform="translate(${x},${y}) scale(${s})">
  <ellipse cx="0" cy="46" rx="60" ry="12" fill="rgba(0,0,0,.08)"/>
  <ellipse cx="6" cy="26" rx="52" ry="26" fill="#fff" stroke="#E8D5E0" stroke-width="3"/>
  <ellipse cx="-46" cy="-26" rx="10" ry="26" fill="#fff" stroke="#E8D5E0" stroke-width="3" transform="rotate(-30 -46 -26)"/>
  <ellipse cx="-24" cy="-30" rx="10" ry="26" fill="#fff" stroke="#E8D5E0" stroke-width="3" transform="rotate(-10 -24 -30)"/>
  <circle cx="-38" cy="8" r="30" fill="#fff" stroke="#E8D5E0" stroke-width="3"/>
  <path d="M -52 4 Q -46 9 -40 4" stroke="#4A3B5C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M -34 4 Q -28 9 -22 4" stroke="#4A3B5C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="-38" cy="16" rx="4" ry="3" fill="#FF7BAC"/>
  <text x="10" y="-42" font-size="30" fill="#7C5CE0">💤</text></g>`;

const TURTLE = (x, y, s = 1, face = '') => `<g transform="translate(${x},${y}) scale(${s})">
  <ellipse cx="0" cy="40" rx="58" ry="12" fill="rgba(0,0,0,.08)"/>
  <ellipse cx="-34" cy="30" rx="12" ry="9" fill="#7BC47F"/><ellipse cx="30" cy="30" rx="12" ry="9" fill="#7BC47F"/>
  <path d="M -50 24 A 50 42 0 0 1 50 24 Z" fill="#4E9F5B"/>
  <path d="M -38 12 A 38 30 0 0 1 38 12 Z" fill="#6DBB74"/>
  <line x1="0" y1="-18" x2="0" y2="22" stroke="#4E9F5B" stroke-width="3"/>
  <line x1="-30" y1="4" x2="30" y2="4" stroke="#4E9F5B" stroke-width="3"/>
  <circle cx="56" cy="6" r="18" fill="#7BC47F"/>
  <circle cx="60" cy="2" r="3.5" fill="#2F5233"/>
  <path d="M 54 12 Q 60 16 66 12" stroke="#2F5233" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="66" cy="8" r="4" fill="#FFC9DD" opacity=".8"/>
  ${face}</g>`;

const DUCK = (x, y, s = 1, body = '#FFD93D', beak = '#FF9F5A') => `<g transform="translate(${x},${y}) scale(${s})">
  <ellipse cx="0" cy="34" rx="34" ry="8" fill="rgba(0,0,0,.08)"/>
  <ellipse cx="0" cy="12" rx="30" ry="24" fill="${body}"/>
  <ellipse cx="-8" cy="14" rx="14" ry="10" fill="rgba(255,255,255,.35)"/>
  <circle cx="20" cy="-16" r="17" fill="${body}"/>
  <circle cx="25" cy="-19" r="3" fill="#4A3B5C"/>
  <path d="M 34 -14 q 12 3 0 8 q -6 2 -6 -4 z" fill="${beak}"/>
  <path d="M -26 6 q -12 -4 -8 8" stroke="${body}" stroke-width="8" fill="none" stroke-linecap="round"/></g>`;

const SWAN = (x, y, s = 1) => `<g transform="translate(${x},${y}) scale(${s})">
  <ellipse cx="0" cy="30" rx="42" ry="9" fill="rgba(0,0,0,.08)"/>
  <ellipse cx="0" cy="10" rx="38" ry="26" fill="#fff"/>
  <path d="M -30 0 q -16 -8 -10 12" stroke="#fff" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 24 4 C 40 -6 34 -34 26 -42 C 22 -46 26 -52 32 -50" stroke="#fff" stroke-width="13" fill="none" stroke-linecap="round"/>
  <circle cx="33" cy="-50" r="10" fill="#fff"/>
  <circle cx="36" cy="-52" r="2.6" fill="#4A3B5C"/>
  <path d="M 42 -49 q 10 2 0 6 q -5 1 -5 -3 z" fill="#FF9F5A"/>
  <path d="M -18 4 Q 0 -10 20 2" stroke="#EFEAF7" stroke-width="4" fill="none"/></g>`;

const LION = (x, y, s = 1, mouth = 'smile') => `<g transform="translate(${x},${y}) scale(${s})">
  <ellipse cx="0" cy="92" rx="60" ry="14" fill="rgba(0,0,0,.08)"/>
  <ellipse cx="0" cy="58" rx="42" ry="36" fill="#F4B860"/>
  <ellipse cx="-26" cy="88" rx="12" ry="9" fill="#E8A54B"/><ellipse cx="26" cy="88" rx="12" ry="9" fill="#E8A54B"/>
  <circle cx="0" cy="-8" r="52" fill="#C97B2D"/>
  <circle cx="0" cy="-8" r="38" fill="#F4B860"/>
  <ellipse cx="-30" cy="-42" rx="10" ry="10" fill="#C97B2D"/><ellipse cx="30" cy="-42" rx="10" ry="10" fill="#C97B2D"/>
  <circle cx="-13" cy="-14" r="4.5" fill="#4A3B5C"/><circle cx="13" cy="-14" r="4.5" fill="#4A3B5C"/>
  <ellipse cx="0" cy="-2" rx="7" ry="5" fill="#8C5A2B"/>
  ${mouth === 'smile'
    ? `<path d="M -10 8 Q 0 16 10 8" stroke="#4A3B5C" stroke-width="3.5" fill="none" stroke-linecap="round"/>`
    : `<ellipse cx="0" cy="10" rx="9" ry="11" fill="#8C5A2B"/><ellipse cx="0" cy="7" rx="9" ry="5" fill="#F4B860"/>`}
  <circle cx="-24" cy="-2" r="6" fill="#FFC9DD" opacity=".55"/><circle cx="24" cy="-2" r="6" fill="#FFC9DD" opacity=".55"/></g>`;

const MOUSE = (x, y, s = 1) => `<g transform="translate(${x},${y}) scale(${s})">
  <ellipse cx="0" cy="26" rx="26" ry="6" fill="rgba(0,0,0,.08)"/>
  <path d="M 24 18 q 22 -2 18 -16" stroke="#B7A6CF" stroke-width="4" fill="none" stroke-linecap="round"/>
  <ellipse cx="0" cy="8" rx="24" ry="18" fill="#CBB8E8"/>
  <circle cx="-16" cy="-12" r="11" fill="#CBB8E8"/><circle cx="-16" cy="-12" r="6" fill="#FFC9DD"/>
  <circle cx="0" cy="-14" r="11" fill="#CBB8E8"/><circle cx="0" cy="-14" r="6" fill="#FFC9DD"/>
  <circle cx="-14" cy="2" r="3" fill="#4A3B5C"/><circle cx="-2" cy="2" r="3" fill="#4A3B5C"/>
  <circle cx="-22" cy="10" r="3.5" fill="#FF7BAC"/>
  <path d="M -14 12 Q -8 16 -2 12" stroke="#4A3B5C" stroke-width="2.5" fill="none" stroke-linecap="round"/></g>`;

const NET = (x, y, s = 1) => `<g transform="translate(${x},${y}) scale(${s})" stroke="#8C6BAE" stroke-width="3" opacity=".85">
  ${[0,1,2,3,4].map(i => `<line x1="${i*28}" y1="0" x2="${i*28}" y2="112"/>`).join('')}

const PITCHER = (x, y, s = 1, water = 0.35, pebbles = 0) => {
  const bot = 46, top = -32;
  const wl = Math.round(bot - (bot - top) * water);
  let peb = '';
  const P = [[-14, 38], [8, 40], [-2, 34], [18, 36], [-20, 34], [12, 30], [0, 26], [-10, 28], [6, 22], [-4, 18]];
  for (let i = 0; i < pebbles && i < P.length; i++) peb += `<circle cx="${P[i][0]}" cy="${P[i][1]}" r="6.5" fill="#9AA3AF" stroke="#727B87" stroke-width="1.5"/>`;
  return `<g transform="translate(${x},${y}) scale(${s})">
    <ellipse cx="0" cy="58" rx="42" ry="10" fill="rgba(0,0,0,.08)"/>
    <path d="M -40 ${wl} Q -30 ${wl - 4} 0 ${wl} Q 30 ${wl - 4} 40 ${wl} L 40 20 Q 40 48 0 48 Q -40 48 -40 20 Z" fill="#5EC6E6" opacity=".85"/>

};

/* ============================================================
   Text-to-Speech (Thai)
   ============================================================ */
const synth = window.speechSynthesis;
let thaiVoice = null;
let speaking = false;

function pickVoice() {
  const voices = synth ? synth.getVoices() : [];
  thaiVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('th')) || null;
  document.getElementById('noVoiceNote').style.display =
    (synth && voices.length > 0 && !thaiVoice) ? 'block' : 'none';
}
if (synth) {
  pickVoice();
  synth.onvoiceschanged = pickVoice;
}

let fallbackTimers = [];
let speakSession = 0;    // กันไม่ให้ event ของเสียงเก่ามาล้างสถานะของเสียงใหม่
let currentAudio = null; // ไฟล์เสียง Edge Neural ที่กำลังเล่น
let currentRate = 1.0;   // ความเร็วที่ผู้ใช้เลือก
let highlightRAF = null;

const AUDIO_BASE = 'audio/';
function audioUrl() { return `${AUDIO_BASE}${currentStory.id}-${sceneIndex}.mp3`; }

function isPlaying() {
  return (currentAudio && !currentAudio.paused && !currentAudio.ended)
      || (synth && synth.speaking && !synth.paused);
}
function isPaused() {
  return (currentAudio && currentAudio.paused && currentAudio.currentTime > 0 && !currentAudio.ended)
      || (synth && synth.paused);
}

/* ---------- ไฮไลต์อ่านตาม: อิงเวลาเล่นจริงของไฟล์เสียง ---------- */
function stopHighlightLoop() {
  if (highlightRAF) { cancelAnimationFrame(highlightRAF); highlightRAF = null; }
}
function startHighlightLoop(audio, session) {
  stopHighlightLoop();
  const tick = () => {
    if (session !== speakSession || !audio) return;
    if (audio.duration) {
      const frac = Math.min(audio.currentTime / audio.duration, 1);
      const pos = frac * textLen;
      let idx = -1;
      for (let i = 0; i < tokenSpans.length; i++) {
        if (pos >= tokenSpans[i].start && pos < tokenSpans[i].end) { idx = i; break; }
      }
      if (idx < 0 && frac >= 0.999) idx = tokenSpans.length - 1;
      tokenSpans.forEach((t, i) => t.el.classList.toggle('on', i === idx));
    }
    if (!audio.ended && session === speakSession) highlightRAF = requestAnimationFrame(tick);
  };
  highlightRAF = requestAnimationFrame(tick);
}

/* ---------- เล่นเสียงหลัก: ไฟล์ Edge Neural แล้ว fallback เป็นเสียงในเครื่อง ---------- */
function speak(text, onDone) {
  const mySession = ++speakSession;
  stopAudioOnly();
  clearFallback();
  clearHighlight();
  setSpeaking(true);
  $('tapHint').textContent = '⏳ กำลังโหลดเสียง...';

  const audio = new Audio(audioUrl());
  audio.playbackRate = currentRate;
  audio.preservesPitch = true;
  audio.mozPreservesPitch = true;
  audio.webkitPreservesPitch = true;
  currentAudio = audio;

  audio.addEventListener('playing', () => {
    if (mySession !== speakSession) return;
    setSpeaking(true);
    $('tapHint').textContent = '🔊 กำลังเล่า...';
    startHighlightLoop(audio, mySession);
  });
  audio.addEventListener('ended', () => {
    if (mySession !== speakSession) return;
    stopHighlightLoop(); clearHighlight(); currentAudio = null; setSpeaking(false);
    if (onDone) onDone();
  });
  audio.addEventListener('error', () => {
    if (mySession !== speakSession) return;
    currentAudio = null;
    webSpeak(text, mySession, onDone);   // โหลดไฟล์เสียงไม่ได้ → ใช้เสียงในเครื่อง
  });

  audio.play().catch(() => {
    if (mySession !== speakSession || !currentAudio) return;
    currentAudio = null;
    webSpeak(text, mySession, onDone);   // เล่นอัตโนมัติถูกบล็อก → ใช้เสียงในเครื่อง
  });
}

/* ---------- เสียงสำรองในเครื่อง (Web Speech) ---------- */
function webSpeak(text, mySession, onDone) {
  if (!synth) { if (mySession === speakSession) { setSpeaking(false); if (onDone) onDone(); } return; }
  synth.cancel();
  clearFallback();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'th-TH';
  if (thaiVoice) u.voice = thaiVoice;
  u.rate = 0.92 * currentRate;
  u.pitch = 1.12;
  u.onend = () => { if (mySession !== speakSession) return; clearFallback(); clearHighlight(); setSpeaking(false); if (onDone) onDone(); };
  u.onerror = () => { if (mySession !== speakSession) return; clearFallback(); clearHighlight(); setSpeaking(false); };
  setSpeaking(true);
  $('tapHint').textContent = '🔊 กำลังเล่า...';
  synth.speak(u);
  startFallbackHighlight(text, u.rate);
}

function clearFallback() {
  fallbackTimers.forEach(t => clearTimeout(t));
  fallbackTimers = [];
}

// ไฮไลต์แบบประมาณเวลา (เฉพาะตอน fallback ใช้เสียงในเครื่อง)
function startFallbackHighlight(text, rate) {
  clearFallback();
  const msPerChar = 90 / rate;
  let acc = 0;
  tokenSpans.forEach((tok) => {
    const at = acc;
    fallbackTimers.push(setTimeout(() => highlightAt(tok.start), at));
    acc += (tok.end - tok.start) * msPerChar + 90;
  });
}

function stopAudioOnly() {
  if (currentAudio) { currentAudio.pause(); currentAudio.removeAttribute('src'); currentAudio.load(); currentAudio = null; }
  stopHighlightLoop();
  if (synth) synth.cancel();
}

function stopSpeak() {
  speakSession++;
  stopAudioOnly();
  clearFallback();
  clearHighlight();
  setSpeaking(false);
}

/* ---------- หยุดชั่วคราว / เล่นต่อ ---------- */
function pauseNarration() {
  if (currentAudio && !currentAudio.paused) { currentAudio.pause(); stopHighlightLoop(); }
  else if (synth && synth.speaking) { synth.pause(); }
  setSpeaking(false);
  $('tapHint').textContent = '⏸️ หยุดไว้ก่อน';
}
function resumeNarration() {
  if (currentAudio && currentAudio.paused) { currentAudio.play(); }        // 'playing' จะจัดการไฮไลต์ต่อเอง
  else if (synth && synth.paused) { synth.resume(); setSpeaking(true); }
  else { speakScene(); }
}
function togglePlay() {
  if (isPlaying()) pauseNarration();
  else if (isPaused()) resumeNarration();
  else speakScene();
}

/* ---------- ปรับความเร็ว ---------- */
function setRate(r) {
  currentRate = r;
  [...$('speedSeg').children].forEach(b => b.classList.toggle('active', parseFloat(b.dataset.rate) === r));
  if (currentAudio) {
    currentAudio.playbackRate = r;                 // เปลี่ยนสดได้ทันที คงระดับเสียงไว้
  } else if (synth && (synth.speaking || synth.paused)) {
    stopSpeak(); speakScene();                      // เสียงในเครื่องเปลี่ยนกลางคันไม่ได้ → เริ่มใหม่
  }
}

/* ---------- read-along word highlight ---------- */
let tokenSpans = [];
let textLen = 1;

function renderText(text) {
  const box = $('sceneText');
  box.textContent = '';
  tokenSpans = [];
  textLen = text.length || 1;
  let idx = 0;
  text.split(/(\s+)/).forEach(part => {
    if (part === '') return;
    if (/^\s+$/.test(part)) {
      box.appendChild(document.createTextNode(part));
    } else {
      const span = document.createElement('span');
      span.className = 'w';
      span.textContent = part;
      box.appendChild(span);
      tokenSpans.push({ start: idx, end: idx + part.length, el: span });
    }
    idx += part.length;
  });
}

function highlightAt(ci) {
  tokenSpans.forEach(t => t.el.classList.toggle('on', ci >= t.start && ci < t.end));
}

function clearHighlight() {
  tokenSpans.forEach(t => t.el.classList.remove('on'));
}

function setSpeaking(on) {
  speaking = on;
  document.getElementById('sceneArt').classList.toggle('speaking', on);
  document.getElementById('sceneText').classList.toggle('speaking', on);
  document.getElementById('playBtn').innerHTML = on ? '⏸️ หยุดก่อน' : '▶️ ฟังนิทาน';
  document.getElementById('tapHint').textContent = on ? '🔊 กำลังเล่า...' : '👆 แตะเพื่อฟัง';
}

/* ============================================================
   App state & rendering
   ============================================================ */
let currentStory = null;
let sceneIndex = 0;

const $ = id => document.getElementById(id);

function renderPicker() {
  const grid = $('storyGrid');
  grid.innerHTML = '';
  STORIES.forEach(story => {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.tabIndex = 0;
    card.innerHTML = `
      <div class="cover">${story.cover}</div>
      <div class="info">
        <h2>${story.title}</h2>
        <p>${story.subtitle}</p>
        <span class="play-hint">📖 อ่านเลย!</span>
      </div>`;
    const open = () => openStory(story);
    card.addEventListener('click', open);
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
    grid.appendChild(card);
  });
}

function openStory(story) {
  currentStory = story;
  sceneIndex = 0;
  $('picker').classList.add('hidden');
  $('reader').classList.add('active');
  $('storyTitle').textContent = story.title;
  renderScene(true);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeStory() {
  stopSpeak();
  $('autoPlay').checked = false;
  $('reader').classList.remove('active');
  $('picker').classList.remove('hidden');
  $('theEnd').classList.remove('show');
  currentStory = null;
}

function renderScene(autoSpeak = false) {
  const scene = currentStory.scenes[sceneIndex];
  const total = currentStory.scenes.length;

  $('sceneSvg').innerHTML = scene.art;
  renderText(scene.text);
  $('sceneCounter').textContent = `ฉากที่ ${sceneIndex + 1} จาก ${total}`;
  $('prevBtn').disabled = sceneIndex === 0;
  $('nextBtn').disabled = sceneIndex === total - 1;
  $('theEnd').classList.remove('show');

  const dots = $('dots');
  dots.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('button');
    d.className = 'dot' + (i === sceneIndex ? ' current' : i < sceneIndex ? ' done' : '');
    d.setAttribute('aria-label', `ไปฉากที่ ${i + 1}`);
    d.addEventListener('click', () => { stopSpeak(); sceneIndex = i; renderScene(true); });
    dots.appendChild(d);
  }

  document.querySelector('.scene-stage').scrollIntoView({ behavior: 'smooth', block: 'center' });
  if (autoSpeak) speakScene();
}

function speakScene() {
  const scene = currentStory.scenes[sceneIndex];
  const isLast = sceneIndex === currentStory.scenes.length - 1;
  speak(scene.text, () => {
    if (isLast) {
      celebrate();
    } else if ($('autoPlay').checked && currentStory) {
      setTimeout(() => {
        if (currentStory && $('autoPlay').checked) { sceneIndex++; renderScene(true); }
      }, 900);
    }
  });
}

function celebrate() {
  $('theEnd').classList.add('show');
  const colors = ['#FF7BAC', '#FFC93C', '#4ECDC4', '#7C5CE0', '#FF9F5A'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    const size = 8 + Math.random() * 8;
    c.style.cssText = `left:${Math.random() * 100}vw; width:${size}px; height:${size * 0.6}px;
      background:${colors[i % colors.length]}; border-radius:${Math.random() > .5 ? '50%' : '3px'};
      animation-duration:${2.5 + Math.random() * 2}s; animation-delay:${Math.random() * .8}s;`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 6000);
  }
}

/* ---------- events ---------- */
$('backBtn').addEventListener('click', closeStory);
$('prevBtn').addEventListener('click', () => { stopSpeak(); sceneIndex--; renderScene(true); });
$('nextBtn').addEventListener('click', () => { stopSpeak(); sceneIndex++; renderScene(true); });
$('playBtn').addEventListener('click', togglePlay);
$('sceneArt').addEventListener('click', togglePlay);
$('sceneArt').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePlay(); }
});
$('speedSeg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-rate]');
  if (btn) setRate(parseFloat(btn.dataset.rate));
});

/* ---------- background bubbles ---------- */
(function makeBubbles() {
  const wrap = $('bubbles');
  const colors = ['#FF7BAC', '#FFC93C', '#4ECDC4', '#7C5CE0', '#FF9F5A'];
  for (let i = 0; i < 14; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 40 + Math.random() * 90;
    b.style.cssText = `width:${size}px; height:${size}px; background:${colors[i % colors.length]};
      left:${Math.random() * 100}%; top:${Math.random() * 100}%;
      animation-duration:${8 + Math.random() * 8}s; animation-delay:${Math.random() * 5}s;`;
    wrap.appendChild(b);
  }
})();

renderPicker();
</script>
